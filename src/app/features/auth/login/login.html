<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cruise Login | OTP Verification</title>
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-box {
      background: #ffffff;
      width: 380px;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.25);
      text-align: center;
    }

    .login-box h2 {
      margin-bottom: 10px;
      color: #2c5364;
    }

    .login-box p {
      font-size: 14px;
      color: #666;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    button {
      width: 100%;
      margin-top: 18px;
      padding: 12px;
      background: linear-gradient(90deg, #ff758c, #ff7eb3);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 15px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      opacity: 0.9;
    }

    .note {
      margin-top: 12px;
      font-size: 12px;
      color: #888;
    }
  </style>
</head>
<body>

  <div class="login-box">
    <h2>Login / Register</h2>
    <p>Enter your email to receive OTP</p>

    <input type="email" id="email" placeholder="Enter your email" />
    <button onclick="sendOTP()">Get OTP</button>

    <input type="text" id="otp" placeholder="Enter OTP" />
    <button onclick="verifyOTP()">Verify & Continue</button>

    <div class="note">Secure OTP-based login for cruise booking</div>
  </div>

  <script>
    function sendOTP() {
      fetch('/send-otp', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: document.getElementById('email').value })
      }).then(res => res.json()).then(data => alert(data.message));
    }

    function verifyOTP() {
      fetch('/verify-otp', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('email').value,
          otp: document.getElementById('otp').value
        })
      }).then(res => res.json()).then(data => alert(data.message));
    }
  </script>

</body>
</html>
